name: VOLSTATE Data Engine (Half-Hourly)

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST
    - cron: '30 3 * * 1-5'
    # 04:00 to 15:30 UTC (Every 30 mins) = 09:30 AM to 09:00 PM IST
    - cron: '0,30 4-15 * * 1-5'

  workflow_dispatch: # Allows manual run button

jobs:
  scrape-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # REQUIRED to save data back to repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        # UPDATED: Switched from Selenium to Playwright
        run: |
          pip install playwright pandas numpy lxml
          playwright install firefox

      # --- UPDATED SECTION: AUTO-RETRY LOGIC ---
      - name: Run Engine (with Retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3          # Try 3 times before failing
          retry_on: error          # Retry if the python script crashes
          command: python VOLSTATE_data_engine.py

      - name: Save Database
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@github.com"
          git add market_data.db
          # Only commit if data actually changed
          git diff-index --quiet HEAD || git commit -m "📊 Data Update: $(date +'%Y-%m-%d %H:%M')"
          git push
